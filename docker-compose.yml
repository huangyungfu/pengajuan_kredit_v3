version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: credit_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: db_kredit_skyworx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: credit_redis_container
    ports:
      - "6379:6379"

volumes:
  pgdata: